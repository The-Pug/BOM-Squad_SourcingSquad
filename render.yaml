services:
  - type: web
    name: bom-squad
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-web.txt
    startCommand: uvicorn web:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.5-flash
